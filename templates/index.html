<!DOCTYPE html>
<html>
<head>
    <title>Smart Algorithm Comparator</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body{
    background-color:#0f172a;
    color:#e2e8f0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items: center;
    padding:20px;
}
h2{
    color:#60a5fa;
    text-align:center;
    margin-bottom:25px;
    font-size:26px;
}
label{
    display:block;
    color:#94a3b8;
    margin:15px 0 15px 0;
    font-weight:500;
}
input{
    width:300px;
    padding:12px;
    background:#1e293b;
    border:2px solid #334155;
    border-radius:8px;
    color:#e2e8f0;
    font-size:15 px;
    box-sizing:border-box;
}
input:focus{
    outline:none;
    border-color:#3b82f6;
}
button{
    width:300px;
    padding:13px;
    background:#3b82f6;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
}
button:hover{
    background:#2563eb;
}
h3{
    color:#60a5fa;
    margin-top:30px;
    margin-bottom:10px;
}
#result{
    width:300px;
    background:#1e293b;
    padding:15px;
    border-radius:8px;
    border-left:3px solid #3b28f6; 
    font-family:'consolas',monospace;
    font-size:14px;
    line-height:1.8;
    min-height:20px;
}
    </style>
</head>
<body>

<h2>Smart Algorithm Comparator</h2>

<label>Enter numbers:</label><br>
<input type="text" id="numbers" placeholder="5,2,9,1,6"><br><br>

<label>Enter number to search:</label><br>
<input type="number" id="target" placeholder="Enter target"><br><br>

<button onclick="compare()">Compare</button>

<h3>Results:</h3>
<p id="result"></p>

<script>
function compare() {
    let numbers = document.getElementById("numbers").value;
    let target = document.getElementById("target").value;

    let arr = numbers.split(",").map(Number);

    fetch("http://127.0.0.1:5000/compare", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            array: arr,
            target: Number(target)
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "Bubble Sort: " + data.bubble + " sec <br>" +
            "Merge Sort: " + data.merge + " sec <br><br>" +
            "Linear Search: " + data.linear + " sec <br>" +
            "Binary Search: " + data.binary + " sec";
    })
    .catch(err => {
        document.getElementById("result").innerHTML = "Error connecting to server";
        console.error(err);
    });
}
</script>

</body>
</html>
